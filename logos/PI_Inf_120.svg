<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cercle principal -->
  <circle cx="100" cy="100" r="90" stroke="#444444" stroke-width="6" fill="white"></circle>

  <!-- Quart haut droite bleu -->
  <path d="M100 10
           A90 90 0 0 1 190 100
           L100 100 Z" fill="#3b82f6"></path>

  <!-- Quart bas droite bleu -->
  <path d="M100 100
           L190 100
           A90 90 0 0 1 100 190
           Z" fill="#3b82f6"></path>

  <!-- Quart bas gauche bleu -->
  <path d="M100 100
           L10 100
           A90 90 0 0 0 100 190
           Z" fill="#3b82f6"></path>

  <!-- Croix -->
  <!-- Verticale -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="#444444" stroke-width="6"></line>
  <!-- Horizontale -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="#444444" stroke-width="6"></line>
</svg>
