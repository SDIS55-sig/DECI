<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Carré principal -->
  <rect x="20" y="20" width="160" height="160" stroke="#444444" stroke-width="4" fill="white"></rect>

  <!-- Carré haut droite (rempli en bleu) -->
  <rect x="100" y="20" width="80" height="80" fill="#3b82f6"></rect>

  <!-- Croix -->
  <!-- Verticale -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#444444" stroke-width="4"></line>

  <!-- Horizontale -->
  <line x1="20" y1="100" x2="180" y2="100" stroke="#444444" stroke-width="4"></line>
</svg>